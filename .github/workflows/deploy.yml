# 自动部署工作流 - 推送到 main 分支时触发
name: 部署到 Cloudflare Pages

on:
  push:
    branches:
      - main

# 同一时间只允许一个部署流程运行，避免并发部署冲突
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: 构建并部署
    runs-on: ubuntu-latest

    steps:
      # 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 配置 Node.js 环境
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 安装依赖
      - name: 安装依赖
        run: npm ci

      # 使用 OpenNext 构建 Next.js 项目
      - name: 构建 Next.js
        run: npx @opennextjs/cloudflare build

      # 将 worker.js 打包为 Pages Function (_worker.js)
      - name: 打包 Worker 为 Pages Function
        run: |
          npx esbuild .open-next/worker.js \
            --bundle \
            --outfile=.open-next/assets/_worker.js \
            --format=esm \
            --target=esnext \
            --platform=node \
            --external:cloudflare:* \
            --minify

      # 部署到 Cloudflare Pages
      - name: 部署到 Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=logistics-portal --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
